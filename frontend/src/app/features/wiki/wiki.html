<div class="page-wrapper">
  <div class="wiki-hero">
    <h1>الموسوعة الزراعية الشاملة</h1>
    <p>كل ما تحتاجه عن النباتات، الأمراض، والأسمدة في مكان واحد</p>
    <div class="search-bar">
      <input type="text" [(ngModel)]="searchQuery" placeholder="ابحث عن نبتة، مرض، أو سماد...">
      <span class="search-icon"></span>
    </div>
  </div>

  <div class="wiki-tabs">
    <button class="wiki-filter" [class.active]="activeTab() === 'plants'" (click)="setTab('plants')">النباتات</button>
    <button class="wiki-filter" [class.active]="activeTab() === 'diseases'"
      (click)="setTab('diseases')">الأمراض</button>
    <button class="wiki-filter" [class.active]="activeTab() === 'fertilizers'"
      (click)="setTab('fertilizers')">الأسمدة</button>
  </div>

  <div class="container section-sm">
    <div class="grid-auto">

      <!-- Plants -->
      <ng-container *ngIf="activeTab() === 'plants'">
        <div *ngFor="let plant of filteredPlants" class="wiki-card" (click)="openModal(plant)">
          <div class="wiki-card-img">
            <img [src]="plant.images[0] || 'assets/images/default.png'">
          </div>
          <div class="wiki-card-body">
            <h3 class="wiki-card-name">{{ plant.commonName }}</h3>
            <span class="badge badge-water">{{ plant.scientificName }}</span>
          </div>
        </div>
      </ng-container>

      <!-- Diseases -->
      <ng-container *ngIf="activeTab() === 'diseases'">
        <div *ngFor="let disease of filteredDiseases" class="wiki-card" (click)="openModal(disease)">
          <div class="wiki-card-img disease-bg">
            <span class="emoji-placeholder">🦠</span>
          </div>
          <div class="wiki-card-body">
            <h3 class="wiki-card-name">{{ disease.name }}</h3>
            <span class="badge badge-error">مرض زراعي</span>
          </div>
        </div>
      </ng-container>

      <!-- Fertilizers -->
      <ng-container *ngIf="activeTab() === 'fertilizers'">
        <div *ngFor="let fert of filteredFertilizers" class="wiki-card" (click)="openModal(fert)">
          <div class="wiki-card-img fert-bg">
            <span class="emoji-placeholder">🧪</span>
          </div>
          <div class="wiki-card-body">
            <h3 class="wiki-card-name">{{ fert.name }}</h3>
            <span class="badge badge-green">{{ fert.type }}</span>
          </div>
        </div>
      </ng-container>

    </div>

    <div
      *ngIf="(activeTab() === 'plants' && filteredPlants.length === 0) || (activeTab() === 'diseases' && filteredDiseases.length === 0) || (activeTab() === 'fertilizers' && filteredFertilizers.length === 0)"
      style="text-align:center;padding:4rem;color:var(--neutral-500)">
      🌵 لا يوجد نتائج لهذا البحث... جرب شيئاً آخر.
    </div>
  </div>
</div>
