<div class="register-container d-flex align-items-center justify-content-center">
  <div class="card register-card shadow-sm my-5">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="brand-title">غراس</h2>
        <p class="text-muted">إنشاء حساب جديد في مجتمع النباتات</p>
      </div>

      <div *ngIf="status === 'error'" class="alert alert-danger px-3 py-2 mb-3 small d-flex align-items-center">
        <span class="ms-2">⚠️</span> {{ errorMessage }}
      </div>

      <div *ngIf="status === 'success'" class="alert alert-success px-3 py-2 mb-3 small d-flex align-items-center">
        <span class="ms-2">✅</span> تم التسجيل بنجاح! جاري تحويلك...
      </div>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label">الاسم الأول</label>
          <input type="text" class="form-control custom-input" [(ngModel)]="user.firstName" name="firstName"
            placeholder="أدخل اسمك الأول" [disabled]="status === 'loading'">
        </div>

        <div class="mb-3">
          <label class="form-label">الاسم الأخير</label>
          <input type="text" class="form-control custom-input" [(ngModel)]="user.lastName" name="lastName"
            placeholder="أدخل اسمك الأخير" [disabled]="status === 'loading'">
        </div>

        <div class="mb-3">
          <label class="form-label">اسم المستخدم (Username)</label>
          <input type="text" class="form-control custom-input" [(ngModel)]="user.username" name="username"
            placeholder="مثال: azeez_26" [disabled]="status === 'loading'">
        </div>

        <div class="mb-3">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-control custom-input" [(ngModel)]="user.email" name="email"
            placeholder="example@mail.com" [disabled]="status === 'loading'">
        </div>

        <div class="mb-3">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-control custom-input" [(ngModel)]="user.password" name="password"
            placeholder="********" [disabled]="status === 'loading'">
        </div>

        <button type="submit" class="btn btn-ghiras w-100 mt-4" [disabled]="status === 'loading'">
          <span *ngIf="status === 'loading'" class="spinner-border spinner-border-sm me-2"></span>
          إنشاء حساب
        </button>

        <div class="divider-register">أو</div>

        <a href="http://localhost:3000/api/users/auth/google" class="btn-google" id="google-register-btn">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05"
              d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z" />
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          التسجيل بحساب Google
        </a>

        <div class="text-center mt-3">
          <small>لديك حساب بالفعل؟ <a routerLink="/login" class="login-link">تسجيل دخول</a></small>
        </div>
      </form>
    </div>
  </div>
</div>
