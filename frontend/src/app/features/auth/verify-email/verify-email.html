<div class="verify-container d-flex align-items-center justify-content-center mt-5">
  <div class="card verify-card shadow-sm animate-fadeup">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="brand-title">تحقق من حسابك</h2>
        <p class="text-muted">أدخل رمز التحقق الذي وصلك عبر البريد الإلكتروني</p>
      </div>

      <div *ngIf="status === 'success'" class="alert alert-success mt-3 animate-fadeup">
        <span class="icon ms-2">✅</span> {{ message }}
      </div>

      <div *ngIf="status === 'error'" class="alert alert-danger mt-3 animate-fadeup">
        <span class="icon ms-2">❌</span> {{ message }}
      </div>

      <form (ngSubmit)="onVerify()" *ngIf="status !== 'success'">
        <div class="mb-3">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-control custom-input"
                 [(ngModel)]="verifyData.email"
                 name="email"
                 placeholder="example@mail.com"
                 required>
        </div>

        <div class="mb-3">
          <label class="form-label">رمز التحقق</label>
          <input type="text" class="form-control custom-input text-center font-monospace"
                 [(ngModel)]="verifyData.code"
                 name="code"
                 placeholder="123456"
                 required
                 style="letter-spacing: 0.5rem; font-size: 1.5rem;">
        </div>

        <button type="submit" class="btn btn-ghiras w-100 mt-4" [disabled]="status === 'loading'">
          <span *ngIf="status === 'loading'" class="spinner-border spinner-border-sm me-2"></span>
          تحقق الآن
        </button>
        
        <div class="text-center mt-3">
          <small>تأكد من مراجعة مجلد الرسائل غير المرغوب فيها (Spam)</small>
        </div>

        <div class="text-center mt-2">
          <a routerLink="/login" class="login-link">العودة لتسجيل الدخول</a>
        </div>
      </form>
    </div>
  </div>
</div>
