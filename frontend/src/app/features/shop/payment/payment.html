<div class="payment-page">
    <div class="payment-container">
        
        <div class="payment-header">
            <button class="back-btn" (click)="goBack()">
                <span class="icon">←</span>
                <span class="text">العودة للبيانات</span>
            </button>
            <div class="header-content">
                <h1>إتمام الدفع</h1>
                <p>طلب رقم: <span class="order-id">#{{ orderId()?.substring(0,8) }}</span></p>
            </div>
        </div>

        <div class="payment-card-ui">
            @if (loading()) {
                <div class="payment-loader">
                    <div class="spinner"></div>
                    <p>جاري تحضير نافذة الدفع الآمن...</p>
                </div>
            } @else if (iframeUrl()) {
                <div class="iframe-wrapper slide-up">
                    <iframe [src]="iframeUrl()!" class="payment-iframe" frameborder="0"></iframe>
                </div>
                <div class="payment-footer">
                    <div class="secure-badge">
                        <span class="lock-icon">🔒</span>
                        <span>دفع آمن ومحمي بأحدث تقنيات التشفير</span>
                    </div>
                </div>
            } @else {
                <div class="payment-error">
                    <span>❌</span>
                    <p>فشل في تحميل نافذة الدفع. الرجاء المحاولة مرة أخرى أو اختيار طريقة دفع أخرى.</p>
                    <button class="btn btn-primary" (click)="goBack()">العودة والاشتراك</button>
                </div>
            }
        </div>

    </div>
</div>
